harbor:
  existingSecretAdminPassword: harbor-admin-secret

  expose:
  type: nodePort  # Changed from ingress
  tls:
    enabled: true
    certSource: selfsigned # Or 'none' if you want plain HTTP (not recommended)
  nodePort:
    name: harbor-dev
    ports:
      http:
        port: 80
        nodePort: 30080  # You can choose any port between 30000-32767
      https:
        port: 443
        nodePort: 30443  # You can choose any port between 30000-32767

      # annotations:
      #   kubernetes.io/ingress.class: nginx
      #   cert-manager.io/cluster-issuer: letsencrypt-prod

      # tls:
      #   enabled: true
      #   secretName: harbor-tls-dev

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        existingClaim: harbor-dev-pvc
      database:
        storageClass: "manual-dev"
      redis:
        storageClass: "manual-dev"
      trivy:
        storageClass: "manual-dev"
      jobservice:
        storageClass: "manual-dev"