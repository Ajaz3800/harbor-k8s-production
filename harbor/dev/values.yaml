harbor:
  existingSecretAdminPassword: harbor-admin-secret

  externalURL: http://192.168.56.11:30080

  proxy:
    config:
      client_max_body_size: "0"       # Allows unlimited image layer sizes
      proxy_read_timeout: "900s"      # Increased for slow VM networking
      proxy_send_timeout: "900s"
      proxy_connect_timeout: "900s"

  expose:
    type: nodePort
    tls:
      enabled: false # Disables TLS/HTTPS
    ingress:
      hosts:
        core: harbor-dev.local # Keep as placeholder to satisfy Helm logic
      controller: default
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 30080

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        existingClaim: harbor-dev-pvc
      database:
        storageClass: "manual-dev"
      redis:
        storageClass: "manual-dev"
      trivy:
        storageClass: "manual-dev"
      jobservice:
        storageClass: "manual-dev"