apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: "*"
    helm:
      valueFiles:
        - harbor/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: harbor-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true