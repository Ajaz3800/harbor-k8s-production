apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Ajaz3800/harbor-k8s-production.git
    targetRevision: HEAD
    path: harbor/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: harbor-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true